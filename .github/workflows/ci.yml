on:
  push:
    branches:
      - main

on:
  pul_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [11,17,21]
    
    steps:

      - name: checkout repository
        uses: actions/checkout@v4

      - name: maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{matrix.java-version}}

      - name: version
        run: java -version

      - name: mvn test
        run: mvn test